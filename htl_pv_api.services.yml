services:
  htl_pv_api.client:
    class: Drupal\htl_pv_api\Service\PVClient
    arguments:
      - '%htl_pv_api.api_base_url%'

  htl_pv_api.store:
    class: Drupal\htl_pv_api\Service\PVStore

  htl_pv_api.field_map:
    class: Drupal\htl_pv_api\Service\PVFieldMap
    arguments:
      - '@config.factory'

parameters:
  htl_pv_api.api_base_url: 'http://localhost:4010'
