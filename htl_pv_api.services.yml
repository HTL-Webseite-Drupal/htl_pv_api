services:
  htl_pv_api.client:
    class: Drupal\htl_pv_api\Service\PVClient
    arguments:
      - '@config.factory'
      - '@htl_pv_api.field_map'

  htl_pv_api.store:
    class: Drupal\htl_pv_api\Service\PVStore

  htl_pv_api.field_map:
    class: Drupal\htl_pv_api\Service\PVFieldMap
    arguments:
      - '@config.factory'
